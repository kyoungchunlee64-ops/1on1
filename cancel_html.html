<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>eMnet 1ON1 — 예약 취소</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;color:#1a1a1a;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
.card{background:#fff;border-radius:16px;padding:2.5rem 2rem;max-width:400px;width:100%;text-align:center;border:1px solid #e5e5e5;box-shadow:0 4px 20px rgba(0,0,0,.08)}
.icon-wrap{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px}
.icon-wrap.red{background:#fee2e2}
.icon-wrap.green{background:#dcfce7}
.icon-wrap.gray{background:#f5f5f5}
h2{font-size:20px;font-weight:700;margin-bottom:10px}
p{font-size:14px;color:#666;line-height:1.7;margin-bottom:20px}
.info-box{background:#f9f9f9;border-radius:10px;padding:16px;text-align:left;font-size:14px;line-height:2;margin-bottom:24px}
.btn-d{width:100%;padding:13px;background:#fff;border:1.5px solid #E24B4A;border-radius:9px;color:#A32D2D;font-size:15px;font-weight:600;cursor:pointer;margin-bottom:10px}
.btn-d:hover{background:#fff5f5}
.btn-sec{width:100%;padding:13px;background:#fff;border:1.5px solid #ddd;border-radius:9px;color:#333;font-size:15px;font-weight:500;cursor:pointer}
.btn-sec:hover{background:#f5f5f5}
.btn-p{width:100%;padding:13px;background:#378ADD;border:none;border-radius:9px;color:#fff;font-size:15px;font-weight:600;cursor:pointer}
.btn-p:hover{background:#185FA5}
</style>
</head>
<body>
<div class="card" id="main-card">
  <div class="icon-wrap gray" id="icon-wrap">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
  </div>
  <h2 id="main-title">예약 취소</h2>
  <p id="main-desc">잠시만 기다려 주세요...</p>
  <div class="info-box" id="info-box" style="display:none"></div>
  <div id="btn-area"></div>
</div>

<script>
const DAYS=['월','화','수','목','금','토','일'];

function loadCfg(){try{return JSON.parse(localStorage.getItem('emnet_cfg')||'null');}catch{return null;}}
function saveCfg(cfg){localStorage.setItem('emnet_cfg',JSON.stringify(cfg));}

function init(){
  const params=new URLSearchParams(window.location.search);
  const token=params.get('token');
  if(!token){showError('유효하지 않은 링크입니다.');return;}

  const cfg=loadCfg();
  if(!cfg||!cfg.bookings){showError('예약 정보를 찾을 수 없습니다.');return;}

  const bk=cfg.bookings.find(b=>b.tok===token);
  if(!bk){showError('예약 정보를 찾을 수 없습니다.');return;}
  if(bk.status==='cancelled'){showAlreadyCancelled();return;}

  // 예약 정보 표시
  const p=bk.date.split('-');
  const dow=DAYS[(new Date(bk.date).getDay()+6)%7];
  document.getElementById('icon-wrap').className='icon-wrap red';
  document.getElementById('icon-wrap').innerHTML=`<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>`;
  document.getElementById('main-title').textContent='예약을 취소하시겠어요?';
  document.getElementById('main-desc').textContent='아래 예약이 취소됩니다. 취소 후에는 되돌릴 수 없어요.';
  document.getElementById('info-box').style.display='block';
  document.getElementById('info-box').innerHTML=`
    <div>👤 <strong>${bk.name}</strong></div>
    <div>📅 ${p[1]}월 ${p[2]}일 (${dow})</div>
    <div>⏰ ${bk.slot} ~ ${bk.slotEnd}</div>
    ${bk.memo?`<div>📝 ${bk.memo}</div>`:''}
  `;
  document.getElementById('btn-area').innerHTML=`
    <button class="btn-d" onclick="doCancel('${token}')">예약 취소 확정</button>
    <button class="btn-sec" onclick="window.location.href='book.html'">돌아가기</button>
  `;
}

function doCancel(token){
  const cfg=loadCfg();
  if(!cfg||!cfg.bookings){showError('오류가 발생했습니다.');return;}
  const bk=cfg.bookings.find(b=>b.tok===token);
  if(!bk){showError('예약 정보를 찾을 수 없습니다.');return;}
  bk.status='cancelled';
  saveCfg(cfg);
  showSuccess(bk);
}

function showSuccess(bk){
  const p=bk.date.split('-');
  const dow=DAYS[(new Date(bk.date).getDay()+6)%7];
  document.getElementById('icon-wrap').className='icon-wrap green';
  document.getElementById('icon-wrap').innerHTML=`<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>`;
  document.getElementById('main-title').textContent='취소가 완료되었어요';
  document.getElementById('main-desc').textContent='예약이 정상적으로 취소되었습니다.\n해당 시간 슬롯이 다시 열렸어요.';
  document.getElementById('info-box').style.display='block';
  document.getElementById('info-box').innerHTML=`
    <div>👤 ${bk.name}</div>
    <div>📅 ${p[1]}월 ${p[2]}일 (${dow}) ${bk.slot} ~ ${bk.slotEnd}</div>
  `;
  document.getElementById('btn-area').innerHTML=`<button class="btn-p" onclick="window.location.href='book.html'">새로 예약하기</button>`;
}

function showAlreadyCancelled(){
  document.getElementById('main-title').textContent='이미 취소된 예약입니다';
  document.getElementById('main-desc').textContent='이미 취소 처리된 예약이에요.';
  document.getElementById('btn-area').innerHTML=`<button class="btn-p" onclick="window.location.href='book.html'">새로 예약하기</button>`;
}

function showError(msg){
  document.getElementById('main-title').textContent='오류가 발생했습니다';
  document.getElementById('main-desc').textContent=msg;
  document.getElementById('btn-area').innerHTML=`<button class="btn-p" onclick="window.location.href='book.html'">예약 페이지로</button>`;
}

init();
</script>
</body>
</html>
